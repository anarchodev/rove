<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loop46 replay</title>
<style>
  body { font: 14px/1.45 system-ui, sans-serif; margin: 0; color: #222; background: #fafafa; }
  header { padding: 0.75em 1em; border-bottom: 1px solid #ddd; background: #fff; }
  header h1 { font-size: 1.1em; margin: 0 0 0.25em; }
  .status { font-size: 0.9em; color: #666; }
  .status.error { color: #b00020; }
  .status.ok { color: #2e7d32; }
  main { display: grid; grid-template-columns: 280px 1fr 360px; gap: 0; height: calc(100vh - 64px); }
  section { padding: 0.75em 1em; overflow: auto; border-right: 1px solid #ddd; }
  section:last-child { border-right: none; }
  h2 { font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.04em; color: #888; margin: 0 0 0.5em; }
  dl { font-family: ui-monospace, monospace; font-size: 12px; margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 2px 1em; }
  dt { color: #888; }
  dd { margin: 0; word-break: break-all; }
  #iframe-mount { padding: 0; border: 0; }
  #iframe-mount iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  ul.side-effects { list-style: none; padding: 0; margin: 0; font-family: ui-monospace, monospace; font-size: 12px; }
  ul.side-effects li { padding: 0.4em 0; border-bottom: 1px dashed #eee; }
  .se-label { display: inline-block; background: #eef; color: #335; padding: 1px 6px; border-radius: 3px; margin-right: 0.5em; }
  ul.side-effects pre { margin: 0.25em 0 0; white-space: pre-wrap; word-break: break-all; color: #333; }
  .hint { color: #888; font-size: 12px; padding-top: 0.5em; }
</style>
</head>
<body>
<header>
  <h1>Loop46 replay</h1>
  <div id="status" class="status info">loading…</div>
</header>
<main>
  <section>
    <h2>Request</h2>
    <dl id="meta"></dl>
    <p class="hint">Open DevTools (F12) before pressing F8 / F10 to step through the handler.</p>
  </section>
  <section id="iframe-mount"></section>
  <section>
    <h2>Side effects</h2>
    <ul id="side-effects" class="side-effects"></ul>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>

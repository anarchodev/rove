# Rewind operator alert rules (Prometheus / Grafana Cloud Mimir ruler format).
#
# Load into Grafana Cloud:
#   mimirtool rules load docs/grafana/alerts/rewind-rules.yaml \
#     --address https://prometheus-prod-66-prod-us-east-3.grafana.net \
#     --id <PROM_USER> --key <GRAFANA_CLOUD_API_KEY>
# (or paste as Grafana-managed alert rules — see docs/grafana/README.md).
#
# Design rules (docs/architecture/observability.md): operator signals only; NO
# per-tenant/per-request labels (active-series + privacy). Alert on SUSTAINED
# conditions (a brief election or reconnect is normal), so every rule has a
# `for:`. Severities: page = wake someone; ticket = look soon.
groups:
  - name: rewind-availability
    rules:
      - alert: RewindProcessDown
        expr: up{job=~"rewind-.*"} == 0
        for: 2m
        labels: { severity: page }
        annotations:
          summary: "{{ $labels.job }} on {{ $labels.instance }} is down"
          description: "A rewind process has been unreachable to scrape for 2m. Check the systemd --user unit + node."

      - alert: RewindNoDirectoryLeader
        # The CP directory group must always have exactly one leader; 0 = the
        # control plane cannot route or accept directory writes (the cold-multi
        # CP genesis wedge presented exactly this).
        expr: sum(raft_is_leader{job="rewind-cp"}) == 0
        for: 2m
        labels: { severity: page }
        annotations:
          summary: "No CP directory leader for 2m"
          description: "The directory raft group has no leader — routing + provisioning are down. Check raftnet_peers_unreachable and CP logs."

  - name: rewind-consensus-wedge
    rules:
      - alert: RewindGroupNoLeader
        # THE wedge signal both this month's incidents held >25s. Worker tenant
        # groups or the CP directory with no known leader.
        expr: max by (job) (raft_groups_no_leader) > 0
        for: 3m
        labels: { severity: page }
        annotations:
          summary: "{{ $labels.job }}: raft group(s) with no leader for 3m"
          description: "A group is neither led nor knows a leader (raft_groups_no_leader > 0) — a failed election / lost quorum. Brief during a real election; sustained is an incident."

      - alert: RewindRaftMeshUnreachable
        # The zombie-connect / network-partition signal: a peer raft must send
        # to but has no outbound connection. Healthy mesh = 0.
        expr: max by (job, instance) (raftnet_peers_unreachable) > 0
        for: 5m
        labels: { severity: page }
        annotations:
          summary: "{{ $labels.job }} {{ $labels.instance }}: raft peer(s) unreachable for 5m"
          description: "raftnet_peers_unreachable > 0 — this node can't reach a configured raft peer (zombie-connect / partition / a peer down). Quorum is at risk."

      - alert: RewindReconcileConfChangeStuck
        # Reconciler is off in cold-multi, so this should never fire; if it does,
        # a deliberate DR op has a conf-change the leader can't commit (the {1,2}
        # grow wedge).
        expr: increase(cp_reconcile_confchange_failed_total[15m]) > 3
        for: 0m
        labels: { severity: ticket }
        annotations:
          summary: "CP reconciler conf-change failing on {{ $labels.instance }}"
          description: "cp_reconcile_confchange_failed_total is climbing — a membership change isn't committing. Check the target node's catch-up + the reconciler promote gate."

  - name: rewind-serving
    rules:
      - alert: RewindHigh5xxRate
        # The serving RED error signal (http_requests_total). >5% 5xx of total,
        # with a floor so a trickle of probes doesn't trip it.
        expr: |
          sum(rate(http_requests_total{code="5xx"}[5m]))
            / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels: { severity: page }
        annotations:
          summary: "5xx rate > 5% for 5m"
          description: "Server-error share is elevated across the fleet. Correlate with raft_groups_no_leader, durabilize failures, and the front connection-stress panels."

      - alert: RewindNoTrafficServed
        # A serving cluster that suddenly serves nothing usually means the edge
        # is broken (front down / cert / routing) even though processes are up.
        expr: sum(rate(http_requests_total{code="2xx"}[10m])) == 0
        for: 10m
        labels: { severity: ticket }
        annotations:
          summary: "No 2xx served in 10m"
          description: "The fleet has served zero successful responses for 10m. Likely an edge/routing/cert issue rather than a process crash (those page separately)."

  - name: rewind-storage-and-edge
    rules:
      - alert: RewindDurabilizeFailing
        # The closest signal to S3/blob degradation today: fold-to-storage
        # failures. (A dedicated blob_* metric set is a planned follow-up.)
        expr: increase(kvexp_durabilize_failed_total[10m]) > 0
        for: 0m
        labels: { severity: page }
        annotations:
          summary: "Durabilize (storage fold) failing on {{ $labels.instance }}"
          description: "kvexp_durabilize_failed_total increased — writes are not folding to storage (S3/blob degradation, throttling, or creds). Committed data is at risk of not durabilizing."

      - alert: RewindFrontConnSetupStress
        expr: sum by (instance) (rate(io_recv_enobufs_total{job="rewind-front"}[5m])) > 0
        for: 5m
        labels: { severity: ticket }
        annotations:
          summary: "Front {{ $labels.instance }} hitting ENOBUFS for 5m"
          description: "The front's io_uring recv buffer pool is exhausting (connection-setup back-pressure). Raise buf_count or investigate a connection flood."

      - alert: RewindFrontFlowLeak
        # Leak canary: in-flight proxy flows should track load and fall to ~0 at
        # idle. A high, non-decreasing floor is a flow leak.
        expr: min_over_time(sum by (instance) (front_proxy_flows_active)[30m:]) > 200
        for: 0m
        labels: { severity: ticket }
        annotations:
          summary: "Front {{ $labels.instance }} proxy-flow floor > 200 for 30m"
          description: "front_proxy_flows_active never dropped below 200 in 30m — likely a leaked/stuck flow rather than sustained load."
